# Optional production deployment only. Local Windows development uses PostgreSQL 17 natively.
services:
  postgres:
    image: postgres:17-alpine
    container_name: rcmc-secureops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secureops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rcmc_secureops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-secureops} -d ${POSTGRES_DB:-rcmc_secureops}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rcmc-secureops-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-secureops}:${POSTGRES_PASSWORD:-secureops_dev_password}@postgres:5432/${POSTGRES_DB:-rcmc_secureops}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - api_uploads:/app/uploads

volumes:
  postgres_data:
  api_uploads:
